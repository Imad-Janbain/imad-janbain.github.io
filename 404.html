<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Imad Janbain</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:wght@400&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  />
  <style>
    :root { --paper: #F2EDE4; --ink: #1A1815; --ink-3: #7A7569; --accent: #C44A1D; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: "IBM Plex Sans", sans-serif;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 32px;
    }
    h1 {
      font-family: "Instrument Serif", serif;
      font-weight: 400;
      font-size: clamp(64px, 12vw, 160px);
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin: 0 0 24px;
    }
    h1 em { font-style: italic; color: var(--accent); }
    p { color: var(--ink-3); max-width: 44ch; margin: 0 auto 32px; line-height: 1.6; }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 22px;
      background: var(--ink); color: var(--paper);
      border-radius: 999px; text-decoration: none;
      font-size: 14.5px; font-weight: 500;
      transition: background-color 180ms ease;
    }
    a:hover { background: var(--accent); }
    .tag {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--ink-3); margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div>
    <p class="tag">Error · 404</p>
    <h1>Signal <em>lost</em>.</h1>
    <p>The page you&rsquo;re looking for isn&rsquo;t in this dataset. Let&rsquo;s get you back to something more predictable.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
